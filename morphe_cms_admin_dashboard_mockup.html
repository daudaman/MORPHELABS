<div style="background:#f4f6f8;border-radius:12px;overflow:hidden;border:0.5px solid var(--border);font-family:var(--font-sans);display:flex;">
  <div style="width:130px;background:#fff;border-right:0.5px solid var(--border);padding:16px 0;">
    <div style="display:flex;align-items:center;gap:6px;padding:0 16px 16px;">
      <div style="width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#0f1220,#635bff);"></div>
      <span style="font-size:12px;font-weight:500;color:var(--text-primary);">CMS Admin</span>
    </div>
    <div style="padding:8px 16px;background:rgba(99,91,255,0.1);color:#635bff;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;"><i class="ti ti-layout-dashboard" style="font-size:14px;" aria-hidden="true"></i>Dashboard</div>
    <div style="padding:8px 16px;color:var(--text-secondary);font-size:12px;display:flex;align-items:center;gap:8px;"><i class="ti ti-file-text" style="font-size:14px;" aria-hidden="true"></i>Blog</div>
    <div style="padding:8px 16px;color:var(--text-secondary);font-size:12px;display:flex;align-items:center;gap:8px;"><i class="ti ti-settings" style="font-size:14px;" aria-hidden="true"></i>Services</div>
    <div style="padding:8px 16px;color:var(--text-secondary);font-size:12px;display:flex;align-items:center;gap:8px;"><i class="ti ti-briefcase" style="font-size:14px;" aria-hidden="true"></i>Careers</div>
  </div>

  <div style="flex:1;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:16px;font-weight:500;margin:0;color:var(--text-primary);">Overview</h2>
      <span style="font-size:12px;color:var(--text-secondary);">Admin (Daud Aman)</span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;">
      <div style="background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <p style="font-size:11px;color:var(--text-secondary);margin:0 0 6px;">Blog posts</p>
        <p style="font-size:20px;font-weight:500;margin:0;color:var(--text-primary);">12</p>
      </div>
      <div style="background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <p style="font-size:11px;color:var(--text-secondary);margin:0 0 6px;">Services</p>
        <p style="font-size:20px;font-weight:500;margin:0;color:var(--text-primary);">6</p>
      </div>
      <div style="background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <p style="font-size:11px;color:var(--text-secondary);margin:0 0 6px;">Open roles</p>
        <p style="font-size:20px;font-weight:500;margin:0;color:var(--text-primary);">3</p>
      </div>
      <div style="background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <p style="font-size:11px;color:var(--text-secondary);margin:0 0 6px;">Drafts</p>
        <p style="font-size:20px;font-weight:500;margin:0;color:var(--text-primary);">4</p>
      </div>
    </div>

    <div style="background:#fff;border-radius:10px;border:0.5px solid var(--border);overflow:hidden;">
      <div style="padding:10px 14px;font-size:12px;font-weight:500;color:var(--text-primary);border-bottom:0.5px solid var(--border);">Recent activity</div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:12px;border-bottom:0.5px solid var(--border);color:var(--text-primary);">
        <i class="ti ti-file-text" style="color:#635bff;font-size:14px;" aria-hidden="true"></i>
        <span style="flex:1;">"Launching our new CMS platform" published</span>
        <span style="color:var(--text-muted);font-size:11px;">2h ago</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:12px;border-bottom:0.5px solid var(--border);color:var(--text-primary);">
        <i class="ti ti-briefcase" style="color:#635bff;font-size:14px;" aria-hidden="true"></i>
        <span style="flex:1;">New career listing "Frontend intern" added</span>
        <span style="color:var(--text-muted);font-size:11px;">1d ago</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:12px;color:var(--text-primary);">
        <i class="ti ti-settings" style="color:#635bff;font-size:14px;" aria-hidden="true"></i>
        <span style="flex:1;">"Automation Consulting" service updated</span>
        <span style="color:var(--text-muted);font-size:11px;">2d ago</span>
      </div>
    </div>
  </div>
</div>
