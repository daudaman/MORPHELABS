<div style="background:#f4f6f8;border-radius:12px;overflow:hidden;border:0.5px solid var(--border);font-family:var(--font-sans);display:flex;">
  <div style="width:130px;background:#fff;border-right:0.5px solid var(--border);padding:16px 0;">
    <div style="padding:0 16px 16px;font-size:13px;font-weight:500;color:var(--text-primary);">CMS Admin</div>
    <div style="padding:8px 16px;background:rgba(99,91,255,0.1);color:#635bff;font-size:12px;font-weight:500;">Blog</div>
    <div style="padding:8px 16px;color:var(--text-secondary);font-size:12px;">Services</div>
    <div style="padding:8px 16px;color:var(--text-secondary);font-size:12px;">Careers</div>
  </div>
  <div style="flex:1;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="font-size:16px;font-weight:500;margin:0;color:var(--text-primary);">Blog posts</h2>
      <div style="background:#635bff;color:#fff;font-size:12px;padding:6px 12px;border-radius:6px;">+ New post</div>
    </div>
    <div style="background:#fff;border-radius:10px;border:0.5px solid var(--border);overflow:hidden;">
      <div style="display:flex;padding:10px 14px;font-size:11px;color:var(--text-secondary);border-bottom:0.5px solid var(--border);">
        <span style="flex:1;">Title</span><span style="width:80px;">Status</span><span style="width:60px;text-align:right;">Actions</span>
      </div>
      <div style="display:flex;align-items:center;padding:10px 14px;font-size:12px;border-bottom:0.5px solid var(--border);color:var(--text-primary);">
        <span style="flex:1;">Launching our new CMS platform</span>
        <span style="width:80px;"><span style="background:rgba(99,157,34,0.12);color:#3b6d11;font-size:11px;padding:2px 8px;border-radius:10px;">Published</span></span>
        <span style="width:60px;text-align:right;color:var(--text-secondary);"><i class="ti ti-edit" style="font-size:14px;margin-right:6px;" aria-hidden="true"></i><i class="ti ti-trash" style="font-size:14px;" aria-hidden="true"></i></span>
      </div>
      <div style="display:flex;align-items:center;padding:10px 14px;font-size:12px;border-bottom:0.5px solid var(--border);color:var(--text-primary);">
        <span style="flex:1;">Five tips for better content workflows</span>
        <span style="width:80px;"><span style="background:rgba(184,117,23,0.12);color:#854f0b;font-size:11px;padding:2px 8px;border-radius:10px;">Draft</span></span>
        <span style="width:60px;text-align:right;color:var(--text-secondary);"><i class="ti ti-edit" style="font-size:14px;margin-right:6px;" aria-hidden="true"></i><i class="ti ti-trash" style="font-size:14px;" aria-hidden="true"></i></span>
      </div>
      <div style="display:flex;align-items:center;padding:10px 14px;font-size:12px;color:var(--text-primary);">
        <span style="flex:1;">Behind the scenes: building the admin panel</span>
        <span style="width:80px;"><span style="background:rgba(99,157,34,0.12);color:#3b6d11;font-size:11px;padding:2px 8px;border-radius:10px;">Published</span></span>
        <span style="width:60px;text-align:right;color:var(--text-secondary);"><i class="ti ti-edit" style="font-size:14px;margin-right:6px;" aria-hidden="true"></i><i class="ti ti-trash" style="font-size:14px;" aria-hidden="true"></i></span>
      </div>
    </div>
  </div>
</div>
