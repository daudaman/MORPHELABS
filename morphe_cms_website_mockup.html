<div style="background:#f7f7fb;border-radius:12px;overflow:hidden;border:0.5px solid var(--border);font-family:var(--font-sans);">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:#0f1220;">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#635bff,#a99bff);"></div>
      <span style="color:#fff;font-weight:500;font-size:15px;">Morphe<span style="color:#a99bff;">CMS</span></span>
    </div>
    <div style="display:flex;gap:20px;">
      <span style="color:#fff;font-size:13px;">Home</span>
      <span style="color:#cfcfe6;font-size:13px;">Blog</span>
      <span style="color:#cfcfe6;font-size:13px;">Services</span>
      <span style="color:#cfcfe6;font-size:13px;">Careers</span>
    </div>
  </div>

  <div style="position:relative;padding:56px 28px;text-align:center;background:linear-gradient(135deg,#0f1220,#635bff);overflow:hidden;">
    <div style="position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.06);top:-40px;left:-40px;"></div>
    <div style="position:absolute;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.05);bottom:-80px;right:-60px;"></div>
    <h1 style="position:relative;color:#fff;font-size:26px;font-weight:500;margin:0 0 8px;">Welcome to Morphe CMS</h1>
    <p style="position:relative;color:#e4e2ff;font-size:14px;margin:0;">A simple content platform for blog, services and careers.</p>
  </div>

  <div style="padding:28px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
    <div style="background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
      <div style="width:34px;height:34px;border-radius:9px;background:rgba(99,91,255,0.12);display:flex;align-items:center;justify-content:center;margin-bottom:10px;"><i class="ti ti-file-text" style="color:#635bff;font-size:18px;" aria-hidden="true"></i></div>
      <p style="font-size:13px;font-weight:500;margin:0 0 4px;color:var(--text-primary);">Blog</p>
      <p style="font-size:12px;color:var(--text-secondary);margin:0;">Latest articles and updates</p>
    </div>
    <div style="background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
      <div style="width:34px;height:34px;border-radius:9px;background:rgba(99,91,255,0.12);display:flex;align-items:center;justify-content:center;margin-bottom:10px;"><i class="ti ti-settings" style="color:#635bff;font-size:18px;" aria-hidden="true"></i></div>
      <p style="font-size:13px;font-weight:500;margin:0 0 4px;color:var(--text-primary);">Services</p>
      <p style="font-size:12px;color:var(--text-secondary);margin:0;">What we offer</p>
    </div>
    <div style="background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
      <div style="width:34px;height:34px;border-radius:9px;background:rgba(99,91,255,0.12);display:flex;align-items:center;justify-content:center;margin-bottom:10px;"><i class="ti ti-briefcase" style="color:#635bff;font-size:18px;" aria-hidden="true"></i></div>
      <p style="font-size:13px;font-weight:500;margin:0 0 4px;color:var(--text-primary);">Careers</p>
      <p style="font-size:12px;color:var(--text-secondary);margin:0;">Open roles</p>
    </div>
  </div>
</div>
